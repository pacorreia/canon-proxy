# Canon Proxy — example bootstrap configuration
# Copy to config.yaml and edit as needed.
#
# Only the database DSN and web listen address are required.
# All other settings are stored in the database and editable
# from the web UI under Settings.

database:
  driver: sqlite          # sqlite | postgres | mssql
  dsn: ./canon-proxy.db   # SQLite file path; for others use a connection string
  # Postgres example: host=localhost user=canon dbname=canon password=secret sslmode=disable
  # MSSQL example: sqlserver://sa:secret@localhost:1433?database=canon

web:
  listen: ":9090"

# ---- First-run seed (optional) ----
# These values are written to the database on first startup
# and ignored on subsequent starts once the DB has its own values.

camera:
  host: "192.168.2.159"
  port: 15740
  poll_interval: 5s

upload:
  workers: 1
  backend: smb    # smb | ftp | s3 | azure | gcs

backends:
  smb:
    host: "192.168.2.9"
    share: "photos"
    username: "user"
    password: "secret"
    path: "/uploads"
