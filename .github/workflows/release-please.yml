name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Force a specific version (e.g. 1.2.3). Leave empty for normal release-please flow.'
        required: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ── Check commit message ──────────────────────────────────────────────────
  check-commit:
    name: Check Commit Prefix
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Evaluate commit message
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif echo "${{ github.event.head_commit.message }}" | grep -qE '^(feat!|feat|fix)(\([^)]*\))?!?:'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Release Please ────────────────────────────────────────────────────────
  release-please:
    name: Release Please
    needs: check-commit
    if: needs.check-commit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-forced.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name || steps.release-forced.outputs.tag_name }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release_as == '')
        id: release
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run release-please (on-demand with forced version)
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        if: github.event_name == 'workflow_dispatch' && inputs.release_as != ''
        id: release-forced
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as:    ${{ inputs.release_as }}

  # ── Resolve release tag (both automated and on-demand paths) ─────────────
  get-tag:
    name: Resolve Release Tag
    needs: release-please
    if: |
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.release_as != '')
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      version:  ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ inputs.release_as }}"
          else
            TAG="${{ needs.release-please.outputs.tag_name }}"
          fi
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"  >> "$GITHUB_OUTPUT"

  # ── Build & publish binaries ─────────────────────────────────────────────
  binaries:
    name: Publish Binaries / ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: get-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/canon-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/canon-proxy

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-tag.outputs.tag_name }}
          files: dist/canon-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # ── Build & push container image ─────────────────────────────────────────
  docker:
    name: Publish Container Image
    needs: get-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.get-tag.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.get-tag.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Package & push Helm chart to OCI ─────────────────────────────────────
  helm:
    name: Publish Helm Chart
    needs: get-tag
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Update Chart versions
        run: |
          VERSION="${{ needs.get-tag.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/"       charts/canon-proxy/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/canon-proxy/Chart.yaml

      - name: Package chart
        run: |
          helm package charts/canon-proxy \
            --version "${{ needs.get-tag.outputs.version }}" \
            --app-version "${{ needs.get-tag.outputs.version }}" \
            --destination dist/

      - name: Push chart to OCI
        run: |
          helm push dist/canon-proxy-${{ needs.get-tag.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-tag.outputs.tag_name }}
          files: dist/canon-proxy-${{ needs.get-tag.outputs.version }}.tgz
