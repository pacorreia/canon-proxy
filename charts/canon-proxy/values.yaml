image:
  repository: ghcr.io/pacorreia/canon-proxy
  tag: ""
  pullPolicy: IfNotPresent

web:
  port: 9090

ingress:
  enabled: false
  # type: ingress | ingressroute
  # "ingress"      — standard Kubernetes Ingress (nginx, traefik, etc.)
  # "ingressroute" — Traefik CRD (IngressRoute)
  type: ingress
  host: ""
  # ingressClassName for standard Ingress (e.g. "nginx", "traefik").
  className: ""
  # Extra annotations added to the Ingress/IngressRoute object.
  annotations: {}
  # TLS configuration for standard Ingress.
  tls:
    enabled: false
    # Name of an existing TLS secret (cert-manager, manual, etc.).
    secretName: ""
  # Traefik IngressRoute-specific options (only used when type=ingressroute).
  ingressRoute:
    # Traefik ingressClassName (Traefik v3+). Leave empty to use the default Traefik instance.
    ingressClassName: ""
    # Entry point names for the HTTPS IngressRoute.
    tlsEntryPoints:
      - websecure
    # Entry point names for the HTTP IngressRoute (used for redirect middleware).
    httpEntryPoints:
      - web
    # Middlewares applied to the HTTP route.
    httpMiddlewares: []
    #  - name: redirect-https
    #    namespace: traefik

# Database backend.
# driver: sqlite (default) | postgres | mssql
# For sqlite the DSN is a file path; persistence.* controls the PVC that holds it.
# For postgres/mssql provide a full connection string and disable the PVC by
# setting persistence.enabled: false.
database:
  driver: sqlite
  dsn: /data/canon-proxy.db
  # For postgres/mssql, set enabled: false — no PVC is needed.
  persistence:
    enabled: true



persistence:
  existingClaim: ""
  size: 1Gi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  annotations: {}
  selector: {}

camera:
  host: ""
  port: 15740
  pollInterval: "5s"
  deleteAfterUpload: false

upload:
  workers: 1
  backend: smb

backends:
  smb:
    host: ""
    share: ""
    username: ""
    path: ""
  ftp:
    host: ""
    port: 21
    username: ""
    path: "/"
  s3:
    region: ""
    bucket: ""
    prefix: ""
    accessKeyID: ""
  azure:
    accountName: ""
    container: ""
    prefix: ""
  gcs:
    bucket: ""

secret:
  existingSecret: ""
  smbPassword: ""
  ftpPassword: ""
  s3SecretKey: ""
  azureSasToken: ""
  gcsServiceAccountJSON: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
